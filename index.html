<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Угадай животное</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Подключаем Comfortaa */
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap');

        body {
            /* Применяем шрифт ко всему документу */
            font-family: 'Comfortaa', cursive;
            background-image: url(black-cat.avif);
            background-position: center;
            background-size: cover;
            text-align: center;
            margin: 0;
            padding: 0;
            color: #2c3e50;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .screen {
            display: none;
            padding: 15px;
            width: 50%;
            max-width: 500px;
            margin: auto;
            box-sizing: border-box;
            background-color: #395a5e5c;
            border-radius: 25px;
            box-shadow: 4px 2px 10px rgba(0, 0, 0, 0.397);
        }
        .active {
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button {
            padding: 14px 28px;
            margin: 8px; /* Чуть увеличил отступ */
            font-size: 18px;
            font-weight: 900; /* У Comfortaa 700 — это жирный */
            border-radius: 20px; /* Сделал еще более круглыми */
            cursor: pointer;
            border: none;
            background: #4a90e2;
            color: white;
            box-shadow: 0 6px 0 #2e66a3;
            transition: all 0.1s;
            text-transform: uppercase;
            font-family: 'Comfortaa', cursive; /* Дублируем для кнопок */
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2e66a3;
        }

        a { text-decoration: none; display: inline-block; }
        
        h1 { font-weight: 700; }
        @media(max-width: 430px) {
            body{
            background-image: url(black-cat2.png);
                background-size: cover;
                background-position: center;
            }
            .screen{
                width: 95%;
            }
            .pryg{
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

<div id="menu" class="screen active">
    <div style="font-size: 60px; margin-bottom: 10px;">🐾</div>
    <h1 class="text-5xl mb-4">Угадайка!</h1>
    
    <div class="pryg text-6xl mb-4 animate-bounce">👂🦁👀</div>
    
    <p class="text-lg mb-8 text-gray-600 font-bold">Слушай звук и находи животное!</p>
    
    <div class="flex flex-col items-center">
        <a href="play1.html">
            <button style="width: 300px; height: 40px; background: #eea19f; margin-bottom: 10px;">Игра по голосу</button>
        </a>
        <a href="play2.html">
            <button style="width: 300px; height: 40px; background: #eea19f;">Игра по именам</button>
        </a>
    </div>

    <button id="exitBtn" class="mt-12" style="background: #76c5cc; box-shadow: 0 6px 0 #7f8c8d; font-size: 14px; padding: 8px 20px; border-radius: 20px;">
        ВЫХОД
    </button>
    <br>
</div>

<script>
    const exitButton = document.getElementById("exitBtn");

    if (exitButton) {
        exitButton.onclick = () => {
            if (confirm("Выйти из игры?")) {
                window.close();
                setTimeout(() => {
                    alert("Чтобы выйти, просто закройте вкладку браузера 😊");
                }, 400);
            }
        };
    }
</script>

</body>
</html>
