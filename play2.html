<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Угадайка: Имена животных</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700;900&display=swap');
        :root {
            --primary: #4a90e2;
            --success: #2ed573;
            --danger: #ff4757;
            --bg-color: #d7dffb;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-image: url(black-cat.avif);
            background-position: center;
            background-size: cover;
            text-align: center;
            margin: 0;
            padding: 0;
            color: #2c3e50;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- АНИМАЦИИ --- */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen {
            display: none;
            padding: 15px;
            width: 50%;
            max-width: 500px;
            margin: auto;
            box-sizing: border-box;
            flex-grow: 1;
            background-color: #395a5e5c;
            border-radius: 25px;
            box-shadow: 4px 2px 10px rgba(0, 0, 0, 0.397);
        }

        .active {
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        button {
            padding: 14px 28px;
            margin: 8px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            background: #4a90e2;
            color: white;
            box-shadow: 0 6px 0 #2e66a3;
            transition: 0.1s;
            text-transform: uppercase;
            font-family: 'Comfortaa', cursive;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2e66a3;
        }

        #soundBtn {
            background: #ff7f50;
            box-shadow: 0 6px 0 #d35400;
            width: 50%;
            height: 40px;
            max-width: 320px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            font-weight: 900;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

        .level-badge {
            background: #f1c40f;
            padding: 6px 12px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            display: inline-block;
        }

        #timer { 
            color: var(--danger); 
            background: #fff5f5;
            padding: 5px 15px;
            border-radius: 15px;
            border: 2px solid #ffebeb;
            font-size: 1rem;
            font-weight: 900;
        }

        .grid {
            display: grid;
            gap: 15px;
            margin: 0 auto 30px auto;
            width: 100%;
            max-width: 550px;
            justify-content: center;
        }

        .card {
            background: white;
            border: 4px solid #f0f0f0;
            border-radius: 25px;
            padding: 0;
            cursor: pointer;
            box-shadow: 0 10px 0 #e0e0e0;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; 
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .card.wrong {
            border-color: var(--danger) !important;
            animation: shake 0.4s;
            box-shadow: 0 10px 0 #cf3544;
        }

        .card.correct {
            border-color: var(--success) !important;
            box-shadow: 0 10px 0 #1e9a50;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(44, 62, 80, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-box {
            background: white;
            padding: 35px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            border: 8px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        @media(max-width: 430px) {
            body{
            background-image: url(black-cat2.png);
                background-size: cover;
                background-position: center;
            }
            .screen{
                width: 95%;
            }
            .pryg{
                font-size: 25px;
            }
            .grid{
                margin: 0 0;
                display: grid;
            gap: 8px;
            }
            .bestbox{
                height: 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
        }
    </style>
</head>
<body>

<div id="menu" class="screen active">
    <div style="font-size: 40px; margin-bottom: 10px;">🐾</div>
    <h1 style="font-size: 3rem; margin: 0;">Угадайка!</h1>
    <div class="pryg text-6xl mb-0 animate-bounce">👂👀</div>
    <p style="color: #5d6d7e; margin-bottom: 30px;">Слушай имя и угадай животное!</p>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 w-full max-w-2xl px-4">
        <div class="bestbox bg-white p-4 rounded-3xl shadow-xl text-center">
            <p class="text-[10px] text-gray-400 uppercase font-black">Рекорд очков</p>
            <p id="highScore" class="text-2xl font-black text-orange-500">⭐ 0</p>
        </div>
        <div class="bestbox bg-white p-4 rounded-3xl shadow-xl text-center">
            <p class=" text-[10px] text-gray-400 uppercase font-black">Лучший уровень</p>
            <p id="highLevel" class="text-2xl font-black text-blue-500">🏆 1</p>
        </div>
        <div class="bestbox bg-white p-4 rounded-3xl shadow-xl text-center">
            <p class=" text-[10px] text-gray-400 uppercase font-black">Лучшая реакция</p>
            <p id="bestTime" class="text-2xl font-black text-green-500">⚡ --</p>
        </div>
    </div>
    
    <button id="playBtn" style="width: 250px; font-size: 24px; background: #eea19f;">ИГРАТЬ</button>
    <br>
    <a href="index.html"><button style="background: #76c5cc; box-shadow: 0 6px 0 #7f8c8d; font-size: 14px; padding: 7px;">ВЫХОД</button></a>
</div>

<div id="game" class="screen">
    <div class="flex justify-between w-full max-w-[600px] mb-4">
        <div id="livesDisplay" class="text-3xl">❤️❤️❤️</div>
        <button id="pauseBtn" class="bg-white/50 p-2 rounded-xl hover:bg-blue-400 font-bold">⏸</button>
    </div>

    <div class="stats-bar">
        <div class="level-side"><span class="level-badge" id="levelLabel">Ур. 1</span></div>
        <div class="timer-side"><div id="timer">⏱ 00:20</div></div>
        <div class="score-side"><div id="score">⭐ 0</div></div>
    </div>

   <button id="soundBtn"><span>🔊 СЛУШАТЬ</span></button>
    <div id="grid" class="grid"></div>
    <button id="backBtn" style="width: 30%; background: #95a5a6; box-shadow: 0 6px 0 #7f8c8d; font-size: 14px; margin-top: 10px;">🏠 В меню</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h2 id="modalTitle" style="margin-top: 0; font-size: 2rem;">Пауза</h2>
        <p id="modalText" style="font-size: 1.3rem; margin-bottom: 25px; white-space: pre-line;"></p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="modalOk" style="margin: 0; background-color:#4a90e2;">Дальше!</button>
            <button id="modalMenu" style="background: #95a5a6; box-shadow: 0 6px 0 #7f8c8d; margin: 0;">Выйти в меню</button>
        </div>
    </div>
</div>

<script>
/* ДАННЫЕ */
const animals = [
    // Легкие: Домашние животные, насекомые и птицы (Уровни 1-10)
    {name:"Кошка", img:"koshka.webp", sound:"koshka.mp3", cat: "easy"},
    {name:"Собака", img:"sobaka.jpg", sound:"sobaka.mp3", cat: "easy"},
    {name:"Петух", img:"petuh.jpg", sound:"petuha.mp3", cat: "easy"},
    {name:"Свинья", img:"svinia.jpg", sound:"svinia.mp3", cat: "easy"},
    {name:"Осел", img:"osel.jpg", sound:"osel.mp3", cat: "easy"},
    {name:"Баран", img:"baran.jpg", sound:"baran.mp3", cat: "easy"},
    {name:"Корова", img:"korova.webp", sound:"korova.mp3", cat: "easy"},
    {name:"Пчела", img:"shmelja.jpeg", sound:"shmelja.mp3", cat: "easy"},
    {name:"Гусь", img:"guse.jpg", sound:"guse.mp3", cat: "easy"},
    {name:"Курица", img:"kuriza.webp", sound:"kuriza.mp3", cat: "easy"},
    {name:"Лошадь", img:"loshad.jpg", sound:"loshad.mp3", cat: "easy"},
    {name:"Муха", img:"mucha.webp", sound:"mucha.mp3", cat: "easy"},
    {name:"Ворона", img:"vorona.jpg", sound:"vorona.mp3", cat: "easy"},
    {name:"Слон", img:"slon.avif", sound:"slon.mp3", cat: "easy"},
    {name:"Обезьяна", img:"obeziana.avif", sound:"obeziana.mp3", cat: "easy"},
    {name:"Змея", img:"smeja.avif", sound:"smeja.mp3", cat: "easy"},
    {name:"Сова", img:"sova.jpg", sound:"sova.mp3", cat: "easy"},
    {name:"Лягушка", img:"liagushka.jpg", sound:"liagushka.mp3", cat: "easy"},
    {name:"Мышка", img:"myshka.jpg", sound:"myshka.mp3", cat: "easy"},
    {name:"Лев", img:"lev.jpg", sound:"lev.mp3", cat: "easy"},
    {name:"Волк", img:"volk.jpg", sound:"volk.mp3", cat: "easy"},
    {name:"Саранча", img:"sarancha.webp", sound:"sarancha.mp3", cat: "easy"},
    {name:"Дельфин", img:"dolphin.jpg", sound:"dolphin.mp3", cat: "easy"},
    {name:"Индюк", img:"induk.jpg", sound:"induk.mp3", cat: "easy"},
    // Средние: Дикие животные и птицы со звуками (Уровни 11-20)
    {name:"Тигр", img:"tigr.jpg", sound:"tigr.mp3", cat: "medium"},
    {name:"Ягуар", img:"jaguer.jpg", sound:"jaguer.mp3", cat: "medium"},
    {name:"Медведь", img:"medved.webp", sound:"medved.mp3", cat: "medium"},
    {name:"Голубь", img:"golubya.jpg", sound:"golubya.mp3", cat: "medium"},
    {name:"Хомяк", img:"homyak.webp", sound:"homyak.mp3", cat: "medium"},
    {name:"Коза", img:"koza.jpg", sound:"koza.mp3", cat: "medium"},
    {name:"Сорока", img:"soroki.jpg", sound:"soroki.mp3", cat: "medium"},
    {name:"Дятел", img:"datel.avif", sound:"datel.mp3", cat: "medium"},
    {name:"Бык", img:"byk.jpg", sound:"byk.mp3", cat: "medium"},
    {name:"Лиса", img:"lisa.webp", sound:"lisa.mp3", cat: "medium"},
    {name:"Заяц", img:"zayas.jpg", sound:"zayas.mp3", cat: "medium"},
    {name:"Белка", img:"belka.jpg", sound:"belka.mp3", cat: "medium"},
    {name:"Страус", img:"straus.jpg", sound:"straus.mp3", cat: "medium"},
    {name:"Верблюд", img:"verblud.webp", sound:"verblud.mp3", cat: "medium"},
    // Сложные: Редкие звуки и смесь (Уровни 21-30)
    {name:"Кит", img:"kit.avif", sound:"kita.mp3", cat: "hard"},
    {name:"Олень", img:"olen.jpg", sound:"olen.mp3", cat: "hard"},
    {name:"Богомол", img:"bogomol.jpg", sound:"bogomol.mp3", cat: "hard"},
    {name:"Павлин", img:"pavlin.webp", sound:"pavlin.mp3", cat: "hard"},
    {name:"Пингвин", img:"pingvin.jpg", sound:"pingvin.mp3", cat: "hard"},
    {name:"Мошка", img:"moshka.jpg", sound:"moshka.mp3", cat: "hard"},
    {name:"Зебра", img:"zebra.jpg", sound:"zebra.mp3", cat: "hard"},
    {name:"Панда", img:"panda.jpg", sound:"panda.mp3", cat: "hard"},
    {name:"Пантера", img:"pantera.webp", sound:"pantera.mp3", cat: "hard"},
    {name:"Крокодил", img:"krokodil.jpg", sound:"krokodil.mp3", cat: "hard"},
    {name:"Капибара", img:"kapibara.jpg", sound:"kapibara.mp3", cat: "hard"},
    {name:"Кабан", img:"kaban.jpg", sound:"kaban.mp3", cat: "hard"},
    {name:"Еж", img:"ej.jpeg", sound:"ej.mp3", cat: "hard"}
];
let score = 0;
let lives = 3;
let level = 1;
const MAX_LEVELS = 30; 
let timeLeft = 25;
let correctAnimal;
let currentAudio = null;
let timerInterval = null;
let isProcessing = false;
let isPaused = false;
let roundStartTime = 0; 
let recentCorrectAnimals = [];

let highScore = parseInt(localStorage.getItem('guess_highScore')) || 0;
let highLevel = parseInt(localStorage.getItem('guess_highLevel')) || 1;
let bestTime = localStorage.getItem('guess_bestTime') ? parseFloat(localStorage.getItem('guess_bestTime')) : null;

const grid = document.getElementById("grid");
const livesDisplay = document.getElementById("livesDisplay");
const scoreDiv = document.getElementById("score");
const levelLabel = document.getElementById("levelLabel");
const timerDisplay = document.getElementById("timer");

/* ГОЛОС (Web Speech API) */
function playSound() {
    if (!correctAnimal || isPaused) return;
    window.speechSynthesis.cancel();
    const talk = new SpeechSynthesisUtterance(correctAnimal.name);
    talk.lang = 'ru-RU';
    talk.rate = 1; // чуть медленнее для детей
    talk.pitch = 1.5;
    window.speechSynthesis.speak(talk);
}

/* ЛОГИКА ИГРЫ */
function updateStats(){
    scoreDiv.textContent = "⭐ " + score;
    livesDisplay.textContent = "❤️".repeat(lives);
    levelLabel.textContent = "Ур." + level;
}

function updateMenuRecords() {
    document.getElementById("highScore").textContent = "⭐ " + highScore;
    document.getElementById("highLevel").textContent = "🏆 " + highLevel;
    document.getElementById("bestTime").textContent = bestTime ? "⚡ " + bestTime + "с" : "⚡ --";
}

function saveRecords() {
    if (score > highScore) { highScore = score; localStorage.setItem('guess_highScore', highScore); }
    if (level > highLevel) { highLevel = level; localStorage.setItem('guess_highLevel', highLevel); }
}

function showModal(title, text, okLabel, okAction){
    document.getElementById("modalTitle").textContent = title;
    document.getElementById("modalText").textContent = text;
    document.getElementById("modalOk").textContent = okLabel;
    document.getElementById("modal").classList.add("active");
    document.getElementById("modalOk").onclick = () => {
        document.getElementById("modal").classList.remove("active");
        if(okAction) okAction();
    };
    document.getElementById("modalMenu").onclick = exitToMenu;
}

function startTimer() {
    stopTimer();
    timerInterval = setInterval(() => {
        if(!isPaused) {
            timeLeft--;
            let min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let sec = String(timeLeft % 60).padStart(2, '0');
            timerDisplay.textContent = `⏱ ${min}:${sec}`;
            if (timeLeft <= 0) {
                stopTimer();
                saveRecords();
                showModal("Время вышло!", `Твой счет: ${score}`, "Заново", restartGame);
            }
        }
    }, 1000);
}
function stopTimer() { if(timerInterval) clearInterval(timerInterval); }

function newRound(){
    isProcessing = false;
    isPaused = false;

    // Цикличная логика карточек (2 -> 4 -> 9)
    let cycleLevel = (level - 1) % 10 + 1;
    let cardCount;
    const grid = document.getElementById("grid");
    
    if (cycleLevel <= 3) {
        cardCount = 2;
        grid.style.gridTemplateColumns = "repeat(2, 1fr)";
    } else if (cycleLevel <= 7) {
        cardCount = 4;
        grid.style.gridTemplateColumns = "repeat(2, 1fr)";
    } else {
        cardCount = 9;
        grid.style.gridTemplateColumns = "repeat(3, 1fr)";
    }

    // Выбор пула сложности
    let pool;
    if (level <= 10) pool = animals.filter(a => a.cat === "easy");
    else if (level <= 20) pool = animals.filter(a => a.cat === "medium");
    else pool = animals.filter(a => a.cat === "hard" || a.cat === "medium");

    // Выбор правильного животного (без частых повторов)
    let available = pool.filter(a => !recentCorrectAnimals.includes(a.name));
    if (available.length < 2) available = pool;
    correctAnimal = available[Math.floor(Math.random() * available.length)];
    
    recentCorrectAnimals.push(correctAnimal.name);
    if (recentCorrectAnimals.length > 5) recentCorrectAnimals.shift();

    // Сбор карточек
     let roundAnimals = [correctAnimal];
    let otherOptions = pool.filter(a => a.name !== correctAnimal.name).sort(() => Math.random() - 0.5);
    
    // Добавляем остальные карточки
    for (let i = 0; i < cardCount - 1; i++) {
        if (otherOptions[i]) {
            roundAnimals.push(otherOptions[i]);
        } else {
            // Если в категории кончились животные, берем из общего списка
            let fallback = animals.filter(a => !roundAnimals.includes(a)).sort(() => Math.random() - 0.5);
            roundAnimals.push(fallback[0]);
        }
    }
    roundAnimals.sort(() => 0.5 - Math.random());

    grid.innerHTML = "";
    roundAnimals.forEach((a, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = (index * 0.05) + "s";
        const img = document.createElement("img");
        img.src = a.img;
        card.appendChild(img);
        card.onclick = () => checkAnswer(a, card);
        grid.appendChild(card);
    });
    
    setTimeout(() => { playSound(); roundStartTime = Date.now(); }, 600);
}

function checkAnswer(animal, card){
    if(isProcessing || isPaused) return;
    if(animal.name === correctAnimal.name){
        isProcessing = true;
        card.classList.add('correct');
        
        const time = parseFloat(((Date.now() - roundStartTime) / 1000).toFixed(2));
        if (bestTime === null || time < bestTime) {
            bestTime = time;
            localStorage.setItem('guess_bestTime', bestTime);
        }


        score += 10;
        if (score > 0 && score % 30 === 0) {
            if (level >= MAX_LEVELS) {
                saveRecords();
                showModal("ГРАНД-ПОБЕДА!", `Ты прошел все ${MAX_LEVELS} уровней!\nСчет: ${score}`, "Еще раз", restartGame);
                return;
            }
            
            level++;
            // Обновление жизней на каждом втором уровне
            if (level % 2 === 0 && lives < 4) lives++; 
            
            updateStats();
            setTimeout(() => {
                showModal("Уровень пройден!", `Переходим на уровень ${level}.\nЖизни обновлены!`, "Поехали!", () => {
                    timeLeft = 25 + Math.floor(level/2); // Увеличиваем время с уровнем
                    startTimer();
                    newRound();
                });
            }, 500);
        } else {
            updateStats();
            saveRecords();
            setTimeout(newRound, 600);
        }
    } else {
        cardElement.classList.add('wrong');
        lives--;
        updateStats();
        if(lives <= 0){
            stopTimer();
            saveRecords();
            setTimeout(() => {
                showModal("Игра окончена", `Ты дошел до ${level} уровня.\nСчет: ${score}`, "Заново", restartGame);
            }, 500);
        }
    }
}

function saveRecords() {
    if (score > highScore) localStorage.setItem('guess_highScore', score);
    if (level > highLevel) localStorage.setItem('guess_highLevel', level);
}

function restartGame(){
    score = 0; lives = 3; level = 1; timeLeft = 25; isPaused = false
    recentCorrectAnimals = [];
    updateStats(); startTimer(); newRound();
}

function exitToMenu(){
    clearInterval(timerInterval);
    isPaused = false;
    document.getElementById("modal").classList.remove("active");
    document.getElementById("game").classList.remove("active");
    document.getElementById("menu").classList.add("active");
    updateMenuRecords();
}

/* СОБЫТИЯ */
document.getElementById("playBtn").onclick = () => {
    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    restartGame();
};
document.getElementById("backBtn").onclick = exitToMenu;
document.getElementById("soundBtn").onclick = playSound;
document.getElementById("pauseBtn").onclick = () => {
    isPaused = true;
    showModal("Пауза", "Игра остановлена. Готов продолжить?", "Продолжить", () => { isPaused = false; });
};

updateMenuRecords();
</script>
</body>
</html>
